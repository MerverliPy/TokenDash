candidates:
  - id: workflow-bootstrap
    title: Bootstrap workflow metadata and contracts
    priority: 100
    status: completed
    summary: Create the initial repo workflow rules, current phase state, backlog, and runtime workflow contract files.
    depends_on: []
    allowed_files:
      - AGENTS.md
      - .opencode/AGENTS.md
      - .opencode/backlog/candidates.yaml
      - .opencode/plans/current-phase.md
      - server/workflow/contracts.ts
      - server/workflow/phaseCatalog.ts
      - server/workflow/mcpPolicy.ts
    required_mcps: []
    acceptance:
      - Root and internal workflow rules exist
      - Backlog exists with bounded TokenDash phases
      - Current phase exists and points at workflow-bootstrap
      - Runtime workflow contracts, phase catalog, and MCP policy exist
    validation:
      - test -f AGENTS.md
      - test -f .opencode/AGENTS.md
      - test -f .opencode/backlog/candidates.yaml
      - test -f .opencode/plans/current-phase.md
      - test -f server/workflow/contracts.ts
      - test -f server/workflow/phaseCatalog.ts
      - test -f server/workflow/mcpPolicy.ts

